<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Status Checker</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>" />
</head>
<body>
  <div class="app">

    <!-- Top navigation bar -->
    <header class="navbar">
      <div class="navbar-inner">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">StatusCheck</span>
        </div>
        <button class="settings-toggle" id="settingsToggle" title="API Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M19.07 4.93l-1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07A10 10 0 0 0 4.93 4.93M19.07 19.07l-1.41-1.41M4.93 4.93l1.41 1.41"/>
          </svg>
          Settings
        </button>
      </div>
    </header>

    <!-- Collapsible API settings panel (hidden by default) -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-inner">
        <label class="settings-label">API Base URL <span class="settings-hint">(leave blank to use local backend)</span></label>
        <input type="text" id="apiUrl" class="settings-input" placeholder="https://your-api-gateway-url.amazonaws.com/Prod" />
        <div class="settings-row">
          <span class="settings-hint">Used when running against the live AWS deployment instead of local SAM</span>
          <button class="btn-save" id="saveSettings">Save</button>
        </div>
      </div>
    </div>

    <!-- Hero section: the main input -->
    <main class="main">
      <div class="hero">
        <h1 class="hero-title">Is it up?</h1>
        <p class="hero-subtitle">Check any website's availability, DNS, and response time instantly.</p>

        <div class="search-wrap">
          <div class="search-box">
            <span class="search-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
            </span>
            <input
              type="text"
              id="urlInput"
              class="search-input"
              placeholder="Enter a URL — e.g. google.com or https://example.com"
              autocomplete="off"
              spellcheck="false"
            />
            <button class="btn-check" id="checkBtn">Check</button>
          </div>

          <!-- Single vs multi-region toggle -->
          <div class="check-type">
            <label class="radio-label">
              <input type="radio" name="checkType" value="single" checked />
              <span>Single Region</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="checkType" value="multi" />
              <span>Multi-Region</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Loading spinner (shown while API request is in flight) -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Checking status…</p>
      </div>

      <!-- Inline error message (replaces browser alert popups) -->
      <div class="error-banner" id="errorBanner">
        <span class="error-icon">✕</span>
        <span id="errorMessage"></span>
        <button class="error-close" id="errorClose">Dismiss</button>
      </div>

      <!-- Results area (populated by main.js) -->
      <div class="results" id="results"></div>
    </main>

    <footer class="footer">
      Built with AWS Lambda · SAM · DynamoDB
    </footer>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
